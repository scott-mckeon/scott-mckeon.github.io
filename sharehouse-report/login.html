<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Homerun | Team access</title>
<style>
:root{--orange:#fb8e28;--ink:#4c3d2f;--paper:#f8f6f3}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--paper);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.gate{width:100%;max-width:380px;text-align:center}
.logo{font-size:26px;font-weight:800;letter-spacing:-.01em;margin-bottom:6px}
.logo span{color:var(--orange)}
.sub{font-size:13px;color:rgba(251,247,240,.55);margin-bottom:32px}
form{display:flex;flex-direction:column;gap:12px}
input{background:rgba(251,247,240,.07);border:1.5px solid rgba(251,247,240,.2);border-radius:10px;padding:13px 16px;font-size:16px;color:var(--paper);outline:none;text-align:center}
input:focus{border-color:var(--orange)}
button{background:var(--orange);color:var(--ink);border:none;border-radius:10px;padding:13px 16px;font-size:15px;font-weight:700;cursor:pointer}
button:hover{background:#f07f1c}
.err{color:var(--orange);font-size:13px;min-height:18px;margin-top:4px}
.foot{margin-top:36px;font-size:11.5px;color:rgba(251,247,240,.35)}
</style>
</head>
<body>
<div class="gate">
  <div class="logo">home<span>run</span></div>
  <p class="sub">The Sharehouse Report · internal access only</p>
  <form id="f">
    <input type="password" id="pw" placeholder="Team password" autocomplete="off" autofocus>
    <button type="submit">Enter</button>
    <div class="err" id="err"></div>
  </form>
  <p class="foot">© 2026 Sharehouse Pro Pty Ltd</p>
</div>
<script>
var HASH='8bc564a29cf3f5cd043d8a27f73e8a98d67dc723650d0565769ee22e704b699d';
document.getElementById('f').addEventListener('submit',async function(e){
  e.preventDefault();
  var pw=document.getElementById('pw').value;
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
  if(hex===HASH){sessionStorage.setItem('hr-auth',HASH);window.location.replace('./index.html');}
  else{document.getElementById('err').textContent='Not quite. Check with Scott.';document.getElementById('pw').value='';}
});
</script>
</body>
</html>
